spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_image?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 改成你自己的MySQL密码

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB
      file-size-threshold: 2MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /

# 文件存储路径配置
file:
  upload:
    path: D:/campus-images/  # Windows上传目录（可以改成你自己的路径）
    # path: /Users/xxx/campus-images/  # Mac上传目录